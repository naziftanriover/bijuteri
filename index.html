<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#d97706" />
<link rel="manifest" href="manifest.json" />
<title>Kuyumcu POS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --color-primary: #d97706;
    --color-primary-dark: #b45309;
    --color-primary-light: #fde68a;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f3f4f6;
    color: #111827;
  }
  .btn-primary {
    background-color: var(--color-primary);
    color: white;
  }
  .btn-primary:hover { background-color: var(--color-primary-dark); }
  .text-primary { color: var(--color-primary); }
  .bg-primary { background-color: var(--color-primary); }
  .border-primary { border-color: var(--color-primary); }
  .ring-primary { --tw-ring-color: var(--color-primary); }

  /* Role-based visibility */
  body.role-cashier .admin-only { display: none !important; }

  /* Toast */
  .toast {
    transition: all 0.3s ease;
    transform: translateX(120%);
  }
  .toast.show { transform: translateX(0); }

  /* Sidebar */
  .nav-item.active {
    background-color: var(--color-primary);
    color: white;
  }
  .nav-item.active svg { color: white; }

  /* Modal */
  .modal-backdrop {
    background: rgba(0,0,0,0.5);
  }

  /* Scrollbar slim */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Loading */
  .spinner {
    border: 3px solid #e5e7eb;
    border-top-color: var(--color-primary);
    border-radius: 50%;
    width: 28px; height: 28px;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hide on small / large */
  @media (max-width: 767px) {
    .desktop-only { display: none !important; }
  }
  @media (min-width: 768px) {
    .mobile-only { display: none !important; }
  }

  /* Product card low stock */
  .low-stock { border-color: #ef4444 !important; box-shadow: 0 0 0 1px #fecaca; }

  /* Print */
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { position: absolute; left: 0; top: 0; width: 100%; }
  }

  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-light); }
</style>
</head>

<!-- ====================== APP SCRIPT ====================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, getDoc, getDocs,
  onSnapshot, deleteDoc, writeBatch, query, where
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

// ============ GLOBAL STATE ============
const STORE_NAME_DEFAULT = 'Kuyumcu POS';
const DEFAULT_PRIMARY = '#d97706';

const state = {
  view: 'pos',
  session: null,           // {role, cashierName, cashierIndex, expiresAt}
  fb: { app: null, db: null, enabled: false, unsubs: [] },
  products: [],
  categories: [],
  customers: [],
  sales: [],
  customerPayments: [],
  settings: {},
  cart: [],                // [{productId, name, sellPrice, buyPrice, qty}]
  cartDiscount: 0,
  cartVatEnabled: false,
  cartVatRate: 18,
  cartCustomerName: '',
  cartCustomerPhone: '',
  cartCustomerId: null,
  currentPay: null,
  posSearch: '',
  stockFilter: 'all',
  reportDateFrom: toLocalISODate(new Date()),
  reportDateTo:   toLocalISODate(new Date()),
  charts: {}
};

// ============ HELPERS ============
// Yerel saat dilimine göre YYYY-MM-DD — UTC toISOString'in aksine sabah 00-03 arası doğru tarihi verir
function toLocalISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dy}`;
}
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const fmt = (n) => Number(n || 0).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' TL';
const fmtDate = (ts) => {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.toLocaleString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
};
const fmtDay = (ts) => {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function showToast(message, type = 'success') {
  const colors = {
    success: 'bg-green-600',
    error: 'bg-red-600',
    warning: 'bg-yellow-600',
    info: 'bg-blue-600'
  };
  const icons = {
    success: '&#x2714;',
    error: '&#x2716;',
    warning: '&#x26A0;',
    info: 'i'
  };
  const el = document.createElement('div');
  el.className = `toast ${colors[type] || colors.success} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 min-w-[260px]`;
  el.innerHTML = `<span class="text-lg">${icons[type] || ''}</span><span class="flex-1">${esc(message)}</span>`;
  $('#toastContainer').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

function showModal(html, opts = {}) {
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4';
  wrap.innerHTML = `<div class="bg-white rounded-2xl shadow-2xl w-full ${opts.maxW || 'max-w-md'} max-h-[92vh] overflow-y-auto">${html}</div>`;
  wrap.addEventListener('click', (e) => { if (e.target === wrap && !opts.persistent) wrap.remove(); });
  $('#modalContainer').appendChild(wrap);
  return wrap;
}
function closeAllModals() { $('#modalContainer').innerHTML = ''; }

function confirmDialog(message, onYes) {
  const m = showModal(`
    <div class="p-6">
      <div class="text-center">
        <div class="w-12 h-12 mx-auto bg-yellow-100 rounded-full flex items-center justify-center text-2xl text-yellow-600 mb-3">?</div>
        <p class="text-gray-700">${esc(message)}</p>
      </div>
      <div class="flex gap-2 mt-6">
        <button class="flex-1 border rounded-lg py-2" data-act="no">Vazgeç</button>
        <button class="flex-1 bg-red-600 text-white rounded-lg py-2" data-act="yes">Evet</button>
      </div>
    </div>
  `);
  m.querySelector('[data-act="no"]').onclick = () => m.remove();
  m.querySelector('[data-act="yes"]').onclick = () => { m.remove(); onYes(); };
}

// ============ STORAGE ============
const LS = {
  get(key, def = null) {
    try { const v = localStorage.getItem(key); return v === null ? def : JSON.parse(v); }
    catch { return def; }
  },
  set(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
};

// ============ SETTINGS ============
async function loadSettings() {
  let s = LS.get('settings');
  if (!s) {
    s = {
      adminPassword: await hashPassword('1234'),
      cashier1Password: await hashPassword('1111'),
      cashier1Name: 'Kasiyer 1',
      cashier2Password: await hashPassword('2222'),
      cashier2Name: 'Kasiyer 2',
      cashier3Password: await hashPassword('3333'),
      cashier3Name: 'Kasiyer 3',
      storeName: STORE_NAME_DEFAULT,
      primaryColor: DEFAULT_PRIMARY
    };
    LS.set('settings', s);
  }
  state.settings = s;
  applyTheme();
}
function applyTheme() {
  const c = state.settings.primaryColor || DEFAULT_PRIMARY;
  document.documentElement.style.setProperty('--color-primary', c);
  // derive a darker tone
  document.documentElement.style.setProperty('--color-primary-dark', shade(c, -15));
  document.documentElement.style.setProperty('--color-primary-light', shade(c, 60));
  const name = state.settings.storeName || STORE_NAME_DEFAULT;
  document.title = name;
  $('#loginStoreName') && ($('#loginStoreName').textContent = name);
  $('#navStoreName') && ($('#navStoreName').textContent = name);
  const letter = (name.trim().charAt(0) || 'P').toUpperCase();
  $('#loginLogo') && ($('#loginLogo').textContent = letter);
  $('#navLogo') && ($('#navLogo').textContent = letter);
}
function shade(hex, percent) {
  const c = hex.replace('#', '');
  const num = parseInt(c, 16);
  let r = (num >> 16) + Math.round(255 * percent / 100);
  let g = ((num >> 8) & 0x00ff) + Math.round(255 * percent / 100);
  let b = (num & 0x0000ff) + Math.round(255 * percent / 100);
  r = Math.min(255, Math.max(0, r));
  g = Math.min(255, Math.max(0, g));
  b = Math.min(255, Math.max(0, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// ============ FIREBASE ============
function parseConfigText(text) {
  const t = (text || '').trim();
  if (!t) return null;
  try { return JSON.parse(t); } catch (_) {}
  try {
    // Try to evaluate JS object literal safely-ish
    const obj = Function('"use strict"; return (' + t + ');')();
    if (obj && typeof obj === 'object') return obj;
  } catch (_) {}
  return null;
}

async function initFirebase() {
  const cfgText = LS.get('firebaseConfigRaw');
  const cfg = cfgText ? parseConfigText(cfgText) : null;
  if (!cfg || !cfg.apiKey) {
    showBanner('Firebase bağlı değil - yerel mod aktif. Bulut senkron için Ayarlar > Firebase Config bölümünden yapılandırın.');
    setFbBadge(false);
    return false;
  }
  try {
    state.fb.app = initializeApp(cfg);
    state.fb.db = getFirestore(state.fb.app);
    state.fb.enabled = true;
    hideBanner();
    setFbBadge(true);
    await pushLocalToFirebaseIfEmpty();
    subscribeFirestore();
    return true;
  } catch (e) {
    console.error('Firebase init error', e);
    showBanner('Firebase bağlanamadı: ' + e.message);
    setFbBadge(false);
    return false;
  }
}

function setFbBadge(on) {
  const b = $('#fbBadge');
  if (!b) return;
  b.classList.remove('hidden');
  if (on) { b.className = 'hidden md:flex items-center gap-1 text-xs px-2 py-1 rounded-full bg-green-100 text-green-700'; b.innerHTML = '<span>&#x25CF;</span> Bulut'; }
  else { b.className = 'hidden md:flex items-center gap-1 text-xs px-2 py-1 rounded-full bg-gray-200 text-gray-700'; b.innerHTML = '<span>&#x25CB;</span> Yerel'; }
}
function showBanner(msg) {
  const b = $('#fbBanner');
  if (!b) return;
  b.textContent = msg;
  b.classList.remove('hidden');
}
function hideBanner() {
  const b = $('#fbBanner');
  if (b) b.classList.add('hidden');
}

async function pushLocalToFirebaseIfEmpty() {
  if (!state.fb.enabled) return;
  try {
    const snap = await getDocs(collection(state.fb.db, 'products'));
    if (!snap.empty) return; // remote has data, do not overwrite
    const localProducts = LS.get('products', []);
    const localCats = LS.get('categories', []);
    const localCust = LS.get('customers', []);
    const localSales = LS.get('sales', []);
    const localPays = LS.get('customerPayments', []);
    if (!localProducts.length && !localCats.length && !localCust.length && !localSales.length) return;
    const batch = writeBatch(state.fb.db);
    localProducts.forEach(p => batch.set(doc(state.fb.db, 'products', p.id), p));
    localCats.forEach(c => batch.set(doc(state.fb.db, 'categories', c.id), c));
    localCust.forEach(c => batch.set(doc(state.fb.db, 'customers', c.id), c));
    localSales.forEach(s => batch.set(doc(state.fb.db, 'sales', s.id), s));
    localPays.forEach(p => batch.set(doc(state.fb.db, 'customerPayments', p.id), p));
    await batch.commit();
    showToast('Yerel veriler buluta yüklendi', 'success');
  } catch (e) {
    console.warn('Push local to FB failed', e);
  }
}

function subscribeFirestore() {
  // Clear old
  state.fb.unsubs.forEach(u => { try { u(); } catch(_){} });
  state.fb.unsubs = [];
  const collections = ['products','categories','customers','sales','customerPayments'];
  collections.forEach(name => {
    const u = onSnapshot(collection(state.fb.db, name), (snap) => {
      const arr = [];
      snap.forEach(d => arr.push(d.data()));
      // Sort deterministically to prevent UI flickering
      if (name === 'products' || name === 'categories' || name === 'customers') {
        arr.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'tr'));
      } else {
        arr.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      }
      state[name] = arr;
      LS.set(name, arr);
      reRenderCurrent();
    }, (err) => {
      console.error('FS sub err', name, err);
    });
    state.fb.unsubs.push(u);
  });
}

// ============ DATA LAYER (FB or LS) ============
async function saveDoc(coll, obj) {
  if (state.fb.enabled) {
    // Optimistic local update — prevents stale data until snapshot arrives
    const arr = [...(state[coll] || [])];
    const idx = arr.findIndex(x => x.id === obj.id);
    if (idx >= 0) arr[idx] = obj; else arr.push(obj);
    state[coll] = arr;
    LS.set(coll, arr);
    await setDoc(doc(state.fb.db, coll, obj.id), obj);
  } else {
    const arr = state[coll] || [];
    const idx = arr.findIndex(x => x.id === obj.id);
    if (idx >= 0) arr[idx] = obj; else arr.push(obj);
    state[coll] = arr;
    LS.set(coll, arr);
    reRenderCurrent();
  }
}
async function removeDoc(coll, id) {
  if (state.fb.enabled) {
    await deleteDoc(doc(state.fb.db, coll, id));
  } else {
    state[coll] = (state[coll] || []).filter(x => x.id !== id);
    LS.set(coll, state[coll]);
    reRenderCurrent();
  }
}
async function batchSave(items) {
  // items = [{coll, obj}]
  if (state.fb.enabled) {
    // Optimistic local update — prevents stale-stock race conditions
    items.forEach(({coll, obj}) => {
      const arr = [...(state[coll] || [])];
      const idx = arr.findIndex(x => x.id === obj.id);
      if (idx >= 0) arr[idx] = obj; else arr.push(obj);
      state[coll] = arr;
      LS.set(coll, arr);
    });
    const b = writeBatch(state.fb.db);
    items.forEach(({coll, obj}) => b.set(doc(state.fb.db, coll, obj.id), obj));
    await b.commit();
  } else {
    items.forEach(({coll, obj}) => {
      const arr = state[coll] || [];
      const idx = arr.findIndex(x => x.id === obj.id);
      if (idx >= 0) arr[idx] = obj; else arr.push(obj);
      state[coll] = arr;
      LS.set(coll, arr);
    });
    reRenderCurrent();
  }
}

function loadLocalData() {
  state.products = LS.get('products', []);
  state.categories = LS.get('categories', []);
  state.customers = LS.get('customers', []);
  state.sales = LS.get('sales', []);

function getSession() {
  const s = LS.get('session');
  if (!s) return null;
  if (s.expiresAt && Date.now() > s.expiresAt) {
    LS.set('session', null);
    return null;
  }
  return s;
}
function setSession(s) {

  LS.set('session', s);
  document.body.classList.remove('role-admin', 'role-cashier');
  if (s) document.body.classList.add('role-' + s.role);
}
function clearSession() {

}

// ============ LOGIN ============
let pendingRole = null;
let pendingCashierIndex = 1;

function initLogin() {
  $$('.role-btn').forEach(b => b.onclick = () => {
    pendingRole = b.dataset.role;
    $('#roleSelector').classList.add('hidden');
    if (pendingRole === 'cashier') {
      $('#cashierSelector').classList.remove('hidden');
    }
    $('#passwordSection').classList.remove('hidden');
    $('#passwordInput').value = '';
    $('#passwordInput').focus();
    $('#loginError').classList.add('hidden');
  });
  $('#backRoleBtn').onclick = () => {
    pendingRole = null;
    $('#roleSelector').classList.remove('hidden');
    $('#cashierSelector').classList.add('hidden');
    $('#passwordSection').classList.add('hidden');
    $('#loginError').classList.add('hidden');
  };
  $('#passwordInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryLogin();
  });
  $('#loginBtn').onclick = tryLogin;
}

async function tryLogin() {
  const pw = $('#passwordInput').value;
  const hash = await hashPassword(pw);
  if (pendingRole === 'admin') {
    if (hash === state.settings.adminPassword) {
      setSession({
        role: 'admin',
        cashierName: 'Yönetim',
        cashierIndex: 0,
        loginTime: Date.now(),
        expiresAt: Date.now() + 12 * 60 * 60 * 1000
      });
      enterApp();
      return;
    }
  } else if (pendingRole === 'cashier') {
    const idx = parseInt($('#cashierSelect').value, 10);
    pendingCashierIndex = idx;
    const expected = state.settings[`cashier${idx}Password`];
    if (hash === expected) {
      const name = state.settings[`cashier${idx}Name`] || ('Kasiyer ' + idx);
      setSession({
        role: 'cashier',
        cashierName: name,
        cashierIndex: idx,
        loginTime: Date.now(),
        expiresAt: Date.now() + 12 * 60 * 60 * 1000
      });
      enterApp();
      return;
    }
  }
  $('#loginError').classList.remove('hidden');
  $('#passwordInput').value = '';
  $('#passwordInput').focus();
}

function enterApp() {
  $('#loginScreen').classList.add('hidden');
  $('#app').classList.remove('hidden');
  $('#currentUserLabel').textContent = state.session.cashierName + ' (' + (state.session.role === 'admin' ? 'Yönetim' : 'Kasiyer') + ')';
  buildMobileNav();
  updateLowStockBadge();
  // default view
  if (state.session.role === 'cashier') {
    setView('pos');
  } else {
    setView('pos');
  }
}

function buildMobileNav() {
  const items = [
    { v: 'pos', l: 'Kasa', admin: false },
    { v: 'stock', l: 'Stok', admin: false },
    { v: 'customers', l: 'Müşteriler', admin: true },
    { v: 'reports', l: 'Raporlar', admin: false },
    { v: 'settings', l: 'Ayarlar', admin: true }
  ];
  $('#mobileNav').innerHTML = items.map(it =>
    `<button data-view="${it.v}" class="mob-side-item ${it.admin ? 'admin-only' : ''} w-full text-left px-3 py-2.5 rounded-lg hover:bg-gray-100">${it.l}</button>`
  ).join('');
  $$('#mobileNav .mob-side-item').forEach(b => {
    b.onclick = () => { setView(b.dataset.view); closeMobileSidebar(); };

function openMobileSidebar() { $('#mobileSidebar').classList.remove('hidden'); }
function closeMobileSidebar() { $('#mobileSidebar').classList.add('hidden'); }

// ============ VIEW ROUTER ============
function setView(v) {
  // Guard admin only
  if ((v === 'customers' || v === 'settings') && state.session.role !== 'admin') {
    v = 'pos';
  }
  state.view = v;
  // highlight
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === v));
  $$('.mob-nav-item').forEach(n => {
    if (n.dataset.view === v) {
      n.classList.add('text-primary');
      n.style.color = 'var(--color-primary)';
    } else {
      n.classList.remove('text-primary');
      n.style.color = '';
    }
  });
  renderView();
}

function reRenderCurrent() {
  if (!state.session) return;
  updateLowStockBadge();
  renderView();
}

function renderView() {
  const c = $('#viewContainer');
  if (!c) return;
  // destroy charts on view change
  Object.values(state.charts).forEach(ch => { try { ch.destroy(); } catch(_){} });
  state.charts = {};
  switch (state.view) {
    case 'pos': c.innerHTML = renderPOS(); bindPOS(); break;
    case 'stock': c.innerHTML = renderStock(); bindStock(); break;
    case 'customers': c.innerHTML = renderCustomers(); bindCustomers(); break;
    case 'reports': c.innerHTML = renderReports(); bindReports(); break;
    case 'settings': c.innerHTML = renderSettings(); bindSettings(); break;
  }
}

function bindPOS() {
  const search = $('#posSearch');
  const results = $('#posResults');
  function renderResults(term) {
    const t = (term || '').trim().toLowerCase();
    let list = state.products;
    if (t) {
      list = state.products.filter(p =>
        (p.name || '').toLowerCase().includes(t) ||
        (p.barcode || '').toLowerCase().includes(t)
      );
    }
    list = list.slice(0, 30);
    if (!list.length) {
      results.innerHTML = `<div class="text-center text-gray-400 py-6">Ürün bulunamadı</div>`;
      return;
    }
    results.innerHTML = list.map(p => {
      const low = p.stock <= (p.minStock || 0);
      const cat = state.categories.find(c => c.id === p.category);
      return `
        <div class="flex items-center gap-3 border rounded-lg p-3 hover:border-primary cursor-pointer" data-pid="${p.id}">
          <div class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center text-gray-500">&#x1F4E6;</div>
          <div class="flex-1 min-w-0">
            <div class="font-medium truncate">${esc(p.name)}</div>
            <div class="text-xs text-gray-500 flex gap-2 flex-wrap">
              <span>${esc(cat ? cat.name : 'Genel')}</span>
              ${p.barcode ? `<span>BC: ${esc(p.barcode)}</span>` : ''}
              <span class="${low ? 'text-red-600 font-semibold' : ''}">Stok: ${p.stock}</span>
            </div>
          </div>
          <div class="text-right">
            <div class="font-bold text-primary">${fmt(p.sellPrice)}</div>
            <button data-add="${p.id}" class="text-xs btn-primary px-2 py-1 rounded mt-1">Ekle</button>
          </div>
        </div>
      `;
    }).join('');
    $$('#posResults [data-add]').forEach(b => b.onclick = (e) => { e.stopPropagation(); addToCart(b.dataset.add); });
    $$('#posResults [data-pid]').forEach(b => b.onclick = () => addToCart(b.dataset.pid));
  }
  renderResults('');
  search.addEventListener('input', (e) => { state.posSearch = e.target.value; renderResults(e.target.value); });
  search.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const t = search.value.trim();
      if (!t) return;
      // try barcode exact
      const exact = state.products.find(p => (p.barcode || '').toLowerCase() === t.toLowerCase());
      if (exact) { addToCart(exact.id); search.value = ''; renderResults(''); return; }
      // first result
      const list = state.products.filter(p =>
        (p.name || '').toLowerCase().includes(t.toLowerCase()) ||
        (p.barcode || '').toLowerCase().includes(t.toLowerCase())
      );
      if (list.length) { addToCart(list[0].id); search.value = ''; renderResults(''); }
    }
  });

  function clearCustomerFields() {
    state.cartCustomerName = ''; state.cartCustomerPhone = ''; state.cartCustomerId = null;
    if ($('#cartCustomerName'))  $('#cartCustomerName').value  = '';
    if ($('#cartCustomerPhone')) $('#cartCustomerPhone').value = '';
    if ($('#custLinkedBadge'))   $('#custLinkedBadge').classList.add('hidden');
    if ($('#custAutoList'))      { $('#custAutoList').innerHTML = ''; $('#custAutoList').classList.add('hidden'); }
    if ($('#customerSelect'))    $('#customerSelect').value = '';
  }
  $('#clearCartBtn').onclick = () => { state.cart = []; state.cartDiscount = 0; clearCustomerFields(); renderCart(); };

  // Autocomplete — müşteri adı arama
  const custNameInput  = $('#cartCustomerName');
  const custPhoneInput = $('#cartCustomerPhone');
  const autoList       = $('#custAutoList');
  function linkCustomer(c) {
    state.cartCustomerName  = c.name;
    state.cartCustomerPhone = c.phone || '';
    state.cartCustomerId    = c.id;
    custNameInput.value  = c.name;
    custPhoneInput.value = c.phone || '';
    autoList.classList.add('hidden');
    $('#custLinkedBadge').classList.remove('hidden');
    // veresiye seçiliyse dropdown'ı da güncelle
    const sel = $('#customerSelect');
    if (sel) sel.value = c.id;
    updateCompleteBtn();
  }
  function showAutoList(term) {
    const t = term.trim().toLowerCase().replace(/\s+/g, ' ');
    const tDigits = t.replace(/\D/g,'');
    const matches = t.length < 1 ? [] : state.customers.filter(c =>
      c.name.toLowerCase().replace(/\s+/g,' ').startsWith(t) ||
      (tDigits.length > 0 && (c.phone || '').replace(/\D/g,'').startsWith(tDigits))
    ).slice(0, 8);
    if (!matches.length) { autoList.classList.add('hidden'); return; }
    autoList.innerHTML = matches.map(c => `
      <div class="px-3 py-2 cursor-pointer rounded-lg text-gray-800"
           onmouseover="this.style.background='var(--color-primary)';this.style.color='#fff'"
           onmouseout="this.style.background='';this.style.color=''"
           data-cid="${c.id}">
        <span class="font-medium">${esc(c.name)}</span>
        ${c.phone ? `<span class="text-xs ml-2 opacity-70">${esc(c.phone)}</span>` : ''}
      </div>`).join('');
    autoList.classList.remove('hidden');
    $$('[data-cid]', autoList).forEach(el => el.onclick = () => {
      const c = state.customers.find(x => x.id === el.dataset.cid);
      if (c) linkCustomer(c);
    });
  }
  custNameInput.addEventListener('input', e => {
    state.cartCustomerName = e.target.value;
    state.cartCustomerId = null;
    $('#custLinkedBadge').classList.add('hidden');
    showAutoList(e.target.value);
  });
  custNameInput.addEventListener('blur', () => setTimeout(() => autoList.classList.add('hidden'), 150));
  custPhoneInput.addEventListener('input', e => {
    state.cartCustomerPhone = e.target.value;
    // telefon ile eşleştir
    const match = state.customers.find(c => c.phone && c.phone.replace(/\D/g,'') === e.target.value.replace(/\D/g,''));
    if (match) linkCustomer(match); else { state.cartCustomerId = null; $('#custLinkedBadge').classList.add('hidden'); }
  });

  // Top 10 müşteri tablosunu doldur (admin dashboard)
  if (state.session.role === 'admin') fillTop10Customers();

  const di = $('#discountInput');
  if (di) di.addEventListener('input', () => {
    const sub = state.cart.reduce((a, c) => a + c.sellPrice * c.qty, 0);
    let v = parseFloat(di.value) || 0;
    if (v < 0) v = 0;
    if (v > sub) { v = sub; di.value = v; }
    state.cartDiscount = v;
    renderCart();
  });
  $('#vatToggle').addEventListener('change', (e) => { state.cartVatEnabled = e.target.checked; renderCart(); });
  $('#vatRate').addEventListener('input', (e) => { state.cartVatRate = parseFloat(e.target.value) || 0; renderCart(); });

  $$('.pay-btn').forEach(b => b.onclick = () => {
    state.currentPay = b.dataset.pay;
    $$('.pay-btn').forEach(x => { x.classList.remove('bg-primary','text-white','border-primary'); x.style.borderColor=''; x.style.backgroundColor=''; x.style.color=''; });
    b.classList.add('bg-primary','text-white','border-primary');
    b.style.backgroundColor = 'var(--color-primary)';
    b.style.color = 'white';
    b.style.borderColor = 'var(--color-primary)';
    $('#customerSelectWrap').classList.toggle('hidden', state.currentPay !== 'credit');
    updateCompleteBtn();
  });
  $('#customerSelect').addEventListener('change', updateCompleteBtn);
  $('#completeSaleBtn').onclick = onCompleteSale;

  // Restore selected payment button from state (after re-render)
  if (state.currentPay) {
    const activeBtn = $$(`.pay-btn`).find(b => b.dataset.pay === state.currentPay);
    if (activeBtn) {
      activeBtn.classList.add('bg-primary','text-white','border-primary');
      activeBtn.style.backgroundColor = 'var(--color-primary)';
      activeBtn.style.color = 'white';
      activeBtn.style.borderColor = 'var(--color-primary)';
    }
    $('#customerSelectWrap').classList.toggle('hidden', state.currentPay !== 'credit');
  }

  renderCart();
}

function addToCart(productId) {
  const p = state.products.find(x => x.id === productId);
  if (!p) return;
  if (p.stock <= 0) { showToast('Stokta yok: ' + p.name, 'warning'); return; }
  if (!p.sellPrice || p.sellPrice <= 0) { showToast(p.name + ' için satış fiyatı tanımlı değil', 'warning'); return; }
  const ex = state.cart.find(c => c.productId === productId);
  if (ex) {
    if (ex.qty + 1 > p.stock) { showToast('Stok yetersiz', 'warning'); return; }
    ex.qty += 1;
  } else {
    state.cart.push({ productId, name: p.name, sellPrice: p.sellPrice, buyPrice: p.buyPrice, qty: 1 });
  }
  renderCart();
}

function renderCart() {
  const list = $('#cartList');
  if (!list) return;
  if (!state.cart.length) {
    list.innerHTML = `<div class="text-center text-gray-400 py-6 text-sm">Sepet boş</div>`;
  } else {
    list.innerHTML = state.cart.map((c, i) => `
      <div class="flex items-center gap-2 border-b pb-2">
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium truncate">${esc(c.name)}</div>
          <div class="text-xs text-gray-500">${fmt(c.sellPrice)} x ${c.qty}</div>
        </div>
        <div class="flex items-center gap-1">
          <button data-act="dec" data-i="${i}" class="w-6 h-6 border rounded">-</button>
          <span class="w-8 text-center text-sm">${c.qty}</span>
          <button data-act="inc" data-i="${i}" class="w-6 h-6 border rounded">+</button>
          <button data-act="del" data-i="${i}" class="ml-1 text-red-600 text-lg">&times;</button>
        </div>
      </div>
    `).join('');
    $$('#cartList button').forEach(b => b.onclick = () => {
      const i = parseInt(b.dataset.i, 10);
      const item = state.cart[i];
      const p = state.products.find(x => x.id === item.productId);
      if (b.dataset.act === 'inc') {
        if (p && item.qty + 1 > p.stock) { showToast('Stok yetersiz', 'warning'); return; }
        item.qty += 1;
      } else if (b.dataset.act === 'dec') {
        item.qty -= 1; if (item.qty <= 0) state.cart.splice(i, 1);
      } else if (b.dataset.act === 'del') {
        state.cart.splice(i, 1);
      }
      renderCart();
    });
  }
  const sub = state.cart.reduce((a, c) => a + c.sellPrice * c.qty, 0);
  const afterDisc = Math.max(0, sub - state.cartDiscount);
  const vat = state.cartVatEnabled ? afterDisc * (state.cartVatRate / 100) : 0;
  const grand = afterDisc + vat;
  $('#subTotal').textContent = fmt(sub);
  $('#vatAmount').textContent = fmt(vat);
  $('#grandTotal').textContent = fmt(grand);
  updateCompleteBtn();
}

function updateCompleteBtn() {
  const btn = $('#completeSaleBtn');
  if (!btn) return;
  let ok = state.cart.length > 0 && state.currentPay;
  if (state.currentPay === 'credit') {
    const dd       = $('#customerSelect');
    const hasDD    = dd && dd.value;
    const hasLinked = !!state.cartCustomerId;
    const typedName  = (state.cartCustomerName  || '').trim();
    const typedPhone = (state.cartCustomerPhone || '').replace(/\D/g,'');
    const hasTyped   = typedName.length >= 2 || typedPhone.length >= 7;
    if (!hasDD && !hasLinked && !hasTyped) ok = false;
  }
  btn.disabled = !ok;
}

async function onCompleteSale() {
  if (!state.cart.length || !state.currentPay) return;
  const creditSelectId = state.currentPay === 'credit' ? ($('#customerSelect') ? $('#customerSelect').value : '') : '';
  if (state.currentPay === 'credit' && !creditSelectId && !state.cartCustomerId) { showToast('Veresiye için müşteri seçin veya bilgi girin', 'warning'); return; }

  const enteredName  = (state.cartCustomerName  || '').trim();
  const enteredPhone = (state.cartCustomerPhone || '').trim();

  // Mevcut müşteri ID'si — önce state, sonra veresiye dropdown
  let resolvedCustomerId = state.cartCustomerId || creditSelectId || null;

  // Ad normalizasyonu — büyük/küçük harf + fazla boşluk farkını ortadan kaldır
  const normName = n => (n || '').trim().toLowerCase().replace(/\s+/g, ' ');
  const normPhone = p => (p || '').replace(/\D/g, '');

  // Yeni müşteri kaydı — ad ya da telefon girilmişse ve ID bağlı değilse
  if ((enteredName || enteredPhone) && !resolvedCustomerId) {
    const byPhone = enteredPhone ? state.customers.find(c => normPhone(c.phone) === normPhone(enteredPhone) && normPhone(enteredPhone).length > 0) : null;
    const byName  = enteredName  ? state.customers.find(c => normName(c.name) === normName(enteredName)) : null;
    const matched = byPhone || byName;
    if (matched) {
      resolvedCustomerId = matched.id;
      // Eğer mevcut kayıtta telefon yoktu, şimdi gelen telefonu ekle
      if (enteredPhone && !matched.phone) {
        const updated = { ...matched, phone: enteredPhone };
        await saveDoc('customers', updated);
        showToast(matched.name + ' bilgileri güncellendi', 'success');
      }
    } else if (enteredName) {
      // Gerçekten yeni müşteri — yalnızca kesin eşleşme yoksa kaydet
      const newCust = { id: uid(), name: enteredName, phone: enteredPhone, balance: 0, createdAt: Date.now() };
      await saveDoc('customers', newCust);
      resolvedCustomerId = newCust.id;
      showToast(enteredName + ' müşteri listesine eklendi', 'success');
    }
  }
  const freeCustomerName = enteredName || (resolvedCustomerId ? (state.customers.find(c => c.id === resolvedCustomerId) || {}).name || '' : '');
  // recompute
  const sub = state.cart.reduce((a, c) => a + c.sellPrice * c.qty, 0);
  const afterDisc = Math.max(0, sub - state.cartDiscount);
  const vat = state.cartVatEnabled ? afterDisc * (state.cartVatRate / 100) : 0;
  const grand = afterDisc + vat;
  const profit = state.cart.reduce((a, c) => a + (c.sellPrice - (c.buyPrice || 0)) * c.qty, 0) - state.cartDiscount;
  const sale = {
    id: uid(),
    items: state.cart.map(c => ({ productId: c.productId, name: c.name, qty: c.qty, sellPrice: c.sellPrice, buyPrice: c.buyPrice || 0 })),
    subTotal: sub,
    discount: state.cartDiscount,
    vat,
    vatRate: state.cartVatEnabled ? state.cartVatRate : 0,
    total: grand,
    profit,
    paymentType: state.currentPay,
    cashierName: state.session.cashierName,
    customerId: resolvedCustomerId || null,
    customerName: freeCustomerName,
    customerPhone: enteredPhone || (resolvedCustomerId ? (state.customers.find(c => c.id === resolvedCustomerId) || {}).phone || '' : ''),
    createdAt: Date.now(),
    cancelled: false
  };

  // update stocks
  const batchItems = [];
  for (const it of sale.items) {
    const p = state.products.find(x => x.id === it.productId);
    if (p) {
      p.stock = Math.max(0, (p.stock || 0) - it.qty);
      batchItems.push({ coll: 'products', obj: { ...p } });
    }
  }
  batchItems.push({ coll: 'sales', obj: sale });
  if (sale.paymentType === 'credit' && resolvedCustomerId) {
    const cust = state.customers.find(c => c.id === resolvedCustomerId);
    if (cust) {
      cust.balance = (cust.balance || 0) + grand;
      batchItems.push({ coll: 'customers', obj: { ...cust } });
    }
  }
  try {
    await batchSave(batchItems);
    showReceipt(sale);
    // Stok uyarısı — satılan ürünlerden kritik seviyeye düşenler
    const kritikUyari = sale.items
      .map(it => state.products.find(p => p.id === it.productId))
      .filter(p => p && p.minStock > 0 && p.stock <= p.minStock);
    if (kritikUyari.length === 1) {
      showToast(`⚠️ ${kritikUyari[0].name}: kritik stok (${kritikUyari[0].stock} adet)`, 'warning');
    } else if (kritikUyari.length > 1) {
      showToast(`⚠️ ${kritikUyari.length} ürün kritik stok seviyesine düştü`, 'warning');
    }
    state.cart = []; state.cartDiscount = 0; state.cartCustomerName = ''; state.cartCustomerPhone = ''; state.cartCustomerId = null; state.currentPay = null;
    if (!state.fb.enabled) renderView();
  } catch (e) {
    console.error(e);
    showToast('Satış kaydedilemedi: ' + e.message, 'error');
  }
}

function showReceipt(sale) {
  const cust = sale.customerId ? state.customers.find(c => c.id === sale.customerId) : null;

        ${sale.items.map(i => `

      </div>
      <div class="mt-3 text-sm space-y-1">
        <div class="flex justify-between"><span>Ara Toplam:</span><span>${fmt(sale.subTotal)}</span></div>
        ${sale.discount ? `<div class="flex justify-between text-red-600"><span>İndirim:</span><span>-${fmt(sale.discount)}</span></div>` : ''}
        ${sale.vat ? `<div class="flex justify-between"><span>KDV (%${sale.vatRate}):</span><span>${fmt(sale.vat)}</span></div>` : ''}
        <div class="flex justify-between text-lg font-bold border-t pt-2"><span>Toplam:</span><span>${fmt(sale.total)}</span></div>
        <div class="flex justify-between"><span>Ödeme:</span><span>${payLabel}</span></div>
        ${sale.customerName ? `<div class="flex justify-between"><span>Müşteri:</span><span class="font-medium">${esc(sale.customerName)}</span></div>` : ''}
        ${sale.customerPhone ? `<div class="flex justify-between text-gray-500 text-xs"><span>Telefon:</span><span>${esc(sale.customerPhone)}</span></div>` : ''}
        <div class="flex justify-between"><span>Kasiyer:</span><span class="font-medium">${esc(sale.cashierName)}</span></div>
      </div>
      <div class="text-center mt-4 text-xs text-gray-500">Bizi tercih ettiğiniz için teşekkürler!</div>
      <div class="flex gap-2 mt-5">
        <button data-act="close" class="flex-1 border rounded-lg py-2">Kapat</button>
        <button data-act="print" class="flex-1 btn-primary rounded-lg py-2">Yazdır</button>
      </div>
    </div>
  `;
  const m = showModal(html);
  m.querySelector('[data-act="close"]').onclick = () => m.remove();
  m.querySelector('[data-act="print"]').onclick = () => {
    const printable = m.querySelector('.bg-white').innerHTML;
    $('#printArea').innerHTML = printable;
    $('#printArea').classList.remove('hidden');
    window.print();
    setTimeout(() => $('#printArea').classList.add('hidden'), 500);
  };
}

function bindReports() {
  // Hızlı aralık butonları
  $$('.quick-btn').forEach(b => b.onclick = () => {
    setQuickRange(b.dataset.quick);
    renderView();
  });
  // Takvim date picker'ları
  const fromInput = $('#reportFrom');
  const toInput = $('#reportTo');
  if (fromInput) fromInput.addEventListener('change', e => { state.reportDateFrom = e.target.value; if (!state.reportDateTo || state.reportDateTo < state.reportDateFrom) { state.reportDateTo = state.reportDateFrom; } renderView(); });
  if (toInput) toInput.addEventListener('change', e => { state.reportDateTo = e.target.value; renderView(); });

  if (state.session.role !== 'admin') return;
  const bounds = getRangeBounds();
  const filtered = state.sales.filter(s => s.createdAt >= bounds.start && s.createdAt < bounds.end);
  const valid = filtered.filter(s => !s.cancelled);

  // Ödeme tipi özet kartları
  const payTotals = { cash: 0, card: 0, credit: 0 };
  const payCounts = { cash: 0, card: 0, credit: 0 };
  valid.forEach(s => {
    const t = s.paymentType;
    if (payTotals[t] !== undefined) { payTotals[t] += s.total; payCounts[t]++; }
  });
  const setEl = (id, val) => { const el = $(id); if (el) el.textContent = val; };
  setEl('#payStatCash',       fmt(payTotals.cash));
  setEl('#payStatCashCount',  payCounts.cash + ' işlem');
  setEl('#payStatCard',       fmt(payTotals.card));
  setEl('#payStatCardCount',  payCounts.card + ' işlem');
  setEl('#payStatCredit',     fmt(payTotals.credit));
  setEl('#payStatCreditCount',payCounts.credit + ' işlem');

  // Trend
  const days = buildDayBuckets(bounds);
  valid.forEach(s => {
    const k = dayKey(s.createdAt);
    if (days[k] !== undefined) days[k] += s.total;
  });
  state.charts.trend = new Chart($('#chartTrend'), {
    type: 'line',
    data: { labels: Object.keys(days), datasets: [{ label: 'Ciro', data: Object.values(days), borderColor: getCssVar('--color-primary'), backgroundColor: getCssVar('--color-primary-light'), tension: 0.3, fill: true }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });

  // Pay
  const pay = { cash:0, card:0, credit:0 };
  valid.forEach(s => { pay[s.paymentType] = (pay[s.paymentType] || 0) + s.total; });
  state.charts.pay = new Chart($('#chartPay'), {
    type: 'doughnut',
    data: { labels: ['Nakit','Kart','Veresiye'], datasets: [{ data: [pay.cash, pay.card, pay.credit], backgroundColor: ['#10b981','#3b82f6','#f59e0b'] }] },
    options: { responsive: true }
  });

  // Category
  const catMap = {};
  valid.forEach(s => s.items.forEach(i => {
    const p = state.products.find(x => x.id === i.productId);
    const catId = p ? p.category : null;
    const cat = state.categories.find(c => c.id === catId);
    const name = cat ? cat.name : 'Genel';
    catMap[name] = (catMap[name] || 0) + i.sellPrice * i.qty;
  }));
  state.charts.cat = new Chart($('#chartCat'), {
    type: 'bar',
    data: { labels: Object.keys(catMap), datasets: [{ label: 'Ciro', data: Object.values(catMap), backgroundColor: getCssVar('--color-primary') }] },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });

  // Cashier performance table + chart
  const cMap = {};
  valid.forEach(s => {
    const name = s.cashierName || 'Bilinmiyor';
    if (!cMap[name]) cMap[name] = { count: 0, total: 0 };
    cMap[name].count += 1;
    cMap[name].total += s.total;
  });
  const totalRev2 = Object.values(cMap).reduce((a, v) => a + v.total, 0);
  const cashierRows = Object.entries(cMap).sort((a, b) => b[1].total - a[1].total);
  const perfColors = ['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444'];
  $('#cashierPerfBody').innerHTML = cashierRows.length === 0
    ? `<tr><td colspan="4" class="text-center py-3 text-gray-400">Satış kaydı yok</td></tr>`
    : cashierRows.map(([name, data], idx) => `
      <tr class="border-t">
        <td class="py-2 flex items-center gap-2">
          <span class="inline-block w-3 h-3 rounded-full" style="background:${perfColors[idx % perfColors.length]}"></span>
          <span class="font-medium">${esc(name)}</span>
        </td>
        <td class="py-2 text-center text-gray-700">${data.count} satış</td>
        <td class="py-2 text-right font-semibold text-green-700">${fmt(data.total)}</td>

function fillTop10Customers() {
  const body = $('#top10Body');
  const empty = $('#top10Empty');
  if (!body) return;
  // customerId ya da customerName bazlı gruplama
  const normN = n => (n || '').trim().toLowerCase().replace(/\s+/g, ' ');
  const map = {};
  state.sales.filter(s => !s.cancelled && (s.customerId || s.customerName)).forEach(s => {
    // customerId varsa onu kullan; yoksa kayıtlı müşteride ada göre ara
    let resolvedId = s.customerId;
    if (!resolvedId && s.customerName) {
      const found = state.customers.find(c => normN(c.name) === normN(s.customerName));
      if (found) resolvedId = found.id;
    }
    const key = resolvedId || ('__' + normN(s.customerName));
    if (!map[key]) {
      const reg = resolvedId ? state.customers.find(c => c.id === resolvedId) : null;
      map[key] = {
        name:  reg ? reg.name  : (s.customerName || ''),
        phone: reg ? (reg.phone || '') : (s.customerPhone || ''),
        count: 0, total: 0
      };
    }
    map[key].count++;
    map[key].total += s.total;
  });
  const top = Object.values(map).sort((a, b) => b.total - a.total).slice(0, 10);
  if (!top.length) {
    body.innerHTML = '';
    if (empty) empty.classList.remove('hidden');
    return;
  }
  if (empty) empty.classList.add('hidden');
  const medals = ['🥇','🥈','🥉'];
  body.innerHTML = top.map((c, i) => `
    <tr class="border-t hover:bg-gray-50">
      <td class="py-2 pl-1 text-lg">${medals[i] || (i + 1)}</td>
      <td class="py-2 font-medium">${esc(c.name || '-')}</td>
      <td class="py-2 text-gray-500 text-xs">${esc(c.phone || '-')}</td>
      <td class="py-2 text-center">
        <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2 py-0.5 rounded-full">${c.count} kez</span>
      </td>
      <td class="py-2 text-right font-bold text-green-700">${fmt(c.total)}</td>
    </tr>`).join('');
}

async function cancelSale(saleId) {
  if (!state.session || state.session.role !== 'admin') { showToast('Bu işlem için yönetici yetkisi gerekli', 'error'); return; }
  const s = state.sales.find(x => x.id === saleId);
  if (!s || s.cancelled) return;
  const items = [];
  const warnings = [];
  for (const it of s.items) {
    const p = state.products.find(x => x.id === it.productId);
    if (p) {
      items.push({ coll: 'products', obj: { ...p, stock: (p.stock || 0) + it.qty } });
    } else {
      warnings.push(`"${it.name}" silinmiş — stok geri yüklenemedi`);
    }
  }
  if (s.paymentType === 'credit' && s.customerId) {
    const c = state.customers.find(x => x.id === s.customerId);
    if (c) {
      items.push({ coll: 'customers', obj: { ...c, balance: (c.balance || 0) - s.total } });
    } else {
      warnings.push('Müşteri silinmiş — veresiye bakiyesi düzeltilemedi');
    }
  }
  const cancelled = { ...s, cancelled: true, cancelledAt: Date.now(), cancelledBy: state.session.cashierName, cancelNote: warnings.join(' | ') || null };
  items.push({ coll: 'sales', obj: cancelled });
  try {
    await batchSave(items);
    if (warnings.length) showToast('İptal edildi (uyarı): ' + warnings[0], 'warning');
    else showToast('Satış iptal edildi', 'success');
    if (!state.fb.enabled) renderView();
  } catch (e) {
    showToast('İptal başarısız: ' + e.message, 'error');
  }
}

function todayBounds() {
  const d = new Date(); d.setHours(0,0,0,0);
  const start = d.getTime();
  const end = start + 24 * 60 * 60 * 1000;
  return { start, end };
}
function getRangeBounds() {
  const fromStr = state.reportDateFrom || toLocalISODate(new Date());
  const toStr   = state.reportDateTo   || fromStr;
  const start   = new Date(fromStr + 'T00:00:00').getTime();
  const end     = new Date(toStr   + 'T00:00:00').getTime() + 24 * 60 * 60 * 1000;
  return { start, end };
}
function setQuickRange(type) {
  const today = new Date();
  const toStr = toLocalISODate(today);
  let fromStr = toStr;
  if (type === 'week') {
    const f = new Date(today); f.setDate(f.getDate() - 6);
    fromStr = toLocalISODate(f);
  } else if (type === 'month') {
    const f = new Date(today); f.setDate(f.getDate() - 29);
    fromStr = toLocalISODate(f);
  } else if (type === 'all') {
    fromStr = '2020-01-01';
  }
  state.reportDateFrom = fromStr;
  state.reportDateTo = toStr;
}
function buildDayBuckets(bounds) {
  const map = {};
  let cur = new Date(bounds.start); cur.setHours(0,0,0,0);
  const last = new Date(bounds.end);
  while (cur <= last) {
    map[dayKey(cur.getTime())] = 0;
    cur = new Date(cur.getTime() + 24*60*60*1000);
  }
  return map;
}
function dayKey(ts) {
  const d = new Date(ts);
  return ('0'+d.getDate()).slice(-2) + '/' + ('0'+(d.getMonth()+1)).slice(-2);
}
function getCssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#d97706';
}

async function loadDemoData() {
  const normN = n => (n || '').trim().toLowerCase().replace(/\s+/g, ' ');
  const existingCatNames   = new Set(state.categories.map(c => normN(c.name)));
  const existingProdNames  = new Set(state.products.map(p => normN(p.name)));
  const existingCustNames  = new Set(state.customers.map(c => normN(c.name)));
  const existingCustPhones = new Set(state.customers.map(c => (c.phone||'').replace(/\D/g,'')).filter(Boolean));

  const items = [];
  const catDefs = ['Altın','Gümüş','Pırlanta','Bijuteri'];
  const catRefs = catDefs.map(name => {
    const ex = state.categories.find(c => normN(c.name) === normN(name));
    if (ex) return ex;
    const obj = { id: uid(), name };
    items.push({ coll: 'categories', obj });
    return obj;
  });

  const sample = [
    { name: 'Bilezik 22 Ayar',    cat: 0, sell: 8500,  buy: 7800,  stock: 10 },
    { name: 'Kolye 14 Ayar',      cat: 0, sell: 3200,  buy: 2700,  stock: 8  },

    { name: 'Gümüş Bileklik',     cat: 1, sell: 320,   buy: 180,   stock: 30 },
    { name: 'Pırlanta Tek Taş',   cat: 2, sell: 18500, buy: 15000, stock: 4  },
    { name: 'Çelik Saat',         cat: 3, sell: 850,   buy: 500,   stock: 15 },
    { name: 'Renkli Boncuk Kolye',cat: 3, sell: 120,   buy: 50,    stock: 50 },
    { name: 'Küpe Set',           cat: 3, sell: 75,    buy: 30,    stock: 100}
  ];
  sample.forEach((s, i) => {
    if (existingProdNames.has(normN(s.name))) return;
    items.push({ coll: 'products', obj: { id: uid(), name: s.name, category: catRefs[s.cat].id, barcode: '86' + String(1000+i).padStart(6,'0'), buyPrice: s.buy, sellPrice: s.sell, stock: s.stock, minStock: 3 } });
  });

  [
    { name: 'Ahmet Yılmaz', phone: '0532 111 22 33', balance: 0 },
    { name: 'Ayşe Demir',   phone: '0533 222 33 44', balance: 1500 },
    { name: 'Mehmet Kaya',  phone: '0535 333 44 55', balance: 0 }
  ].forEach(c => {

    items.push({ coll: 'customers', obj: { id: uid(), name: c.name, phone: c.phone, balance: c.balance, createdAt: Date.now() } });

}
function exportBackup() {
  const data = {
    exportedAt: new Date().toISOString(),
    products: state.products,
    categories: state.categories,
    customers: state.customers,
    sales: state.sales,
    customerPayments: state.customerPayments,
    settings: { ...state.settings, adminPassword: '***', cashier1Password: '***', cashier2Password: '***', cashier3Password: '***' }
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'pos-yedek-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Yedek indirildi', 'success');
}
async function resetAllData() {
  if (state.fb.enabled) {
    try {
      const colls = ['products','categories','customers','sales','customerPayments'];
      for (const c of colls) {
        const snap = await getDocs(collection(state.fb.db, c));
        const b = writeBatch(state.fb.db);
        snap.forEach(d => b.delete(d.ref));
        await b.commit();
      }
    } catch (e) {
      showToast('Bulut silme hatası: ' + e.message, 'error');
      return;
    }
  }
  ['products','categories','customers','sales','customerPayments'].forEach(k => {
    state[k] = [];
    LS.set(k, []);
  });
  showToast('Tüm veriler sıfırlandı', 'success');
  renderView();
}

// ============ GÜN SONU KAPANIS RAPORU ============
function openDayCloseReport() {
  const today = todayBounds();
  const todaySales = state.sales.filter(s => !s.cancelled && s.createdAt >= today.start && s.createdAt < today.end);

  const totalCount  = todaySales.length;
  const totalRev    = todaySales.reduce((a, s) => a + (s.total || 0), 0);
  const totalProfit = todaySales.reduce((a, s) => a + (s.profit || 0), 0);
  const nakit       = todaySales.filter(s => s.paymentType === 'cash').reduce((a, s) => a + (s.total || 0), 0);
  const kart        = todaySales.filter(s => s.paymentType === 'card').reduce((a, s) => a + (s.total || 0), 0);
  const veresiye    = todaySales.filter(s => s.paymentType === 'credit').reduce((a, s) => a + (s.total || 0), 0);

  // Kasiyer bazlı tablo
  const cashierMap = {};
  todaySales.forEach(s => {
    const k = s.cashierName || 'Bilinmiyor';
    if (!cashierMap[k]) cashierMap[k] = { count: 0, rev: 0, profit: 0 };
    cashierMap[k].count++;
    cashierMap[k].rev    += s.total  || 0;
    cashierMap[k].profit += s.profit || 0;
  });

  // En çok satılan ürünler
  const prodMap = {};
  todaySales.forEach(s => (s.items || []).forEach(it => {
    if (!prodMap[it.name]) prodMap[it.name] = { qty: 0, rev: 0 };
    prodMap[it.name].qty += it.qty || 0;
    prodMap[it.name].rev += (it.sellPrice || 0) * (it.qty || 0);
  }));
  const topProds = Object.entries(prodMap).sort((a, b) => b[1].qty - a[1].qty).slice(0, 5);

  // Yeni müşteriler
  const newCusts = state.customers.filter(c => c.createdAt && c.createdAt >= today.start && c.createdAt < today.end);

  // Kritik stok
  const kritik = state.products.filter(p => p.stock <= (p.minStock || 0) && (p.minStock || 0) > 0);

  const storeName = state.settings.storeName || STORE_NAME_DEFAULT;
  const dateStr = new Date().toLocaleDateString('tr-TR', { day: '2-digit', month: 'long', year: 'numeric' });

  const html = `
    <div class="p-5 max-w-2xl">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h3 class="text-xl font-bold">📋 Gün Sonu Kapanış Raporu</h3>
          <p class="text-sm text-gray-500">${esc(storeName)} — ${dateStr}</p>
        </div>
        <button data-act="print" class="btn-primary text-sm px-3 py-1.5 rounded-lg">🖨️ Yazdır</button>
      </div>

      <!-- Özet kartlar -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
        <div class="bg-blue-50 rounded-lg p-3 text-center">
          <div class="text-xs text-blue-600 font-medium">Toplam Satış</div>
          <div class="text-xl font-bold text-blue-700">${totalCount}</div>
        </div>
        <div class="bg-green-50 rounded-lg p-3 text-center">
          <div class="text-xs text-green-600 font-medium">Toplam Gelir</div>
          <div class="text-xl font-bold text-green-700">${fmt(totalRev)}</div>
        </div>
        <div class="bg-orange-50 rounded-lg p-3 text-center">
          <div class="text-xs text-orange-600 font-medium">Kâr</div>
          <div class="text-xl font-bold text-orange-700">${fmt(totalProfit)}</div>
        </div>
        <div class="bg-purple-50 rounded-lg p-3 text-center">
          <div class="text-xs text-purple-600 font-medium">Yeni Müşteri</div>
          <div class="text-xl font-bold text-purple-700">${newCusts.length}</div>
        </div>
      </div>

      <!-- Ödeme dökümü -->
      <div class="bg-gray-50 rounded-xl p-3 mb-4">
        <div class="font-semibold text-sm mb-2">💰 Ödeme Dökümü</div>
        <div class="grid grid-cols-3 gap-2 text-sm">
          <div class="bg-white rounded-lg p-2 text-center border">
            <div class="text-gray-500 text-xs">Nakit</div>
            <div class="font-bold text-gray-800">${fmt(nakit)}</div>
          </div>
          <div class="bg-white rounded-lg p-2 text-center border">
            <div class="text-gray-500 text-xs">Kart</div>
            <div class="font-bold text-gray-800">${fmt(kart)}</div>
          </div>
          <div class="bg-white rounded-lg p-2 text-center border">
            <div class="text-gray-500 text-xs">Veresiye</div>
            <div class="font-bold text-red-700">${fmt(veresiye)}</div>
          </div>
        </div>
      </div>

      <!-- Kasiyer performansı -->
      <div class="mb-4">
        <div class="font-semibold text-sm mb-2">👤 Kasiyer Performansı</div>
        ${Object.keys(cashierMap).length === 0 ? '<p class="text-gray-400 text-sm">Bugün satış yok</p>' : `
        <table class="w-full text-sm border-collapse">
          <thead><tr class="bg-gray-100 text-xs text-gray-600">
            <th class="text-left p-2 rounded-tl">Kasiyer</th>
            <th class="text-center p-2">Satış</th>
            <th class="text-right p-2">Gelir</th>
            <th class="text-right p-2 rounded-tr">Kâr</th>
          </tr></thead>
          <tbody>
            ${Object.entries(cashierMap).map(([k, v]) => `
              <tr class="border-b">
                <td class="p-2 font-medium">${esc(k)}</td>
                <td class="p-2 text-center">${v.count}</td>
                <td class="p-2 text-right">${fmt(v.rev)}</td>
                <td class="p-2 text-right text-green-700">${fmt(v.profit)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>

      <!-- En çok satılan ürünler -->
      ${topProds.length ? `
      <div class="mb-4">
        <div class="font-semibold text-sm mb-2">🔥 En Çok Satılan Ürünler</div>
        <div class="space-y-1">
          ${topProds.map(([name, v], i) => `
            <div class="flex items-center justify-between text-sm bg-gray-50 rounded px-3 py-1.5">
              <span class="text-gray-500 w-5">${i+1}.</span>
              <span class="flex-1 font-medium">${esc(name)}</span>
              <span class="text-gray-600 mr-4">${v.qty} adet</span>
              <span class="font-semibold">${fmt(v.rev)}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}

      <!-- Kritik stok -->
      ${kritik.length ? `
      <div class="bg-red-50 border border-red-200 rounded-xl p-3 mb-4">
        <div class="font-semibold text-sm text-red-800 mb-2">⚠️ Kritik Stok (${kritik.length} ürün)</div>
        <div class="grid grid-cols-2 gap-1 text-xs">
          ${kritik.map(p => `
            <div class="flex justify-between bg-white border border-red-100 rounded px-2 py-1">
              <span class="truncate">${esc(p.name)}</span>
              <span class="font-bold text-red-600 ml-2">${p.stock} adet</span>
            </div>`).join('')}
        </div>
      </div>` : `
      <div class="bg-green-50 border border-green-200 rounded-xl p-3 mb-4 text-sm text-green-700">
        ✅ Tüm ürünler minimum stok seviyesinin üzerinde.
      </div>`}

      <div class="text-center mt-4">
        <button data-act="close" class="border rounded-lg px-6 py-2 text-sm">Kapat</button>
      </div>
    </div>
  `;
  const m = showModal(html, { maxW: 'max-w-2xl' });
  m.querySelector('[data-act="print"]').onclick = () => {
    const printable = m.querySelector('.bg-white').innerHTML;
    $('#printArea').innerHTML = printable;
    $('#printArea').classList.remove('hidden');
    window.print();
    setTimeout(() => $('#printArea').classList.add('hidden'), 500);
  };
  m.querySelector('[data-act="close"]').onclick = () => m.remove();
}

function bindGlobal() {
  $$('.nav-item').forEach(b => b.onclick = () => setView(b.dataset.view));
  $$('.mob-nav-item').forEach(b => b.onclick = () => setView(b.dataset.view));
  $('#logoutBtn').onclick = () => {
    confirmDialog('Çıkış yapılsın mı?', () => {
      clearSession();
      location.reload();
    });
  };
  // Günü Kapat butonları
  const openClose = () => openDayCloseReport();
  const dcBtn = $('#dayCloseBtn');
  const dcBtnSb = $('#dayCloseBtnSidebar');
  if (dcBtn) dcBtn.onclick = openClose;
  if (dcBtnSb) dcBtnSb.onclick = openClose;
  $('#mobileMenuBtn').onclick = openMobileSidebar;
  $('#closeMobileSidebar').onclick = closeMobileSidebar;
  $('#mobileSidebarBackdrop').onclick = closeMobileSidebar;

  // Gizli sistem ayarları — logoya 5 kez tıkla
  let logoClickCount = 0, logoClickTimer = null;
  const logoEl = document.querySelector('#navLogo')?.parentElement;
  if (logoEl) {
    logoEl.style.cursor = 'pointer';
    logoEl.addEventListener('click', () => {
      if (state.session?.role !== 'admin') return;
      logoClickCount++;
      clearTimeout(logoClickTimer);
      logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
      if (logoClickCount >= 5) {
        logoClickCount = 0;
        openSystemSettings();
      }
    });
  }
}

// ============ INIT ============
async function init() {
  await loadSettings();
  loadLocalData();

  // Try to init Firebase if config exists
  await initFirebase();

  // SW register
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW kayıt hatası:', err));
  }

  initLogin();
  bindGlobal();

  // Auto session
  const s = getSession();
  if (s) {
    setSession(s);
    enterApp();
  } else {
    $('#loginScreen').classList.remove('hidden');
    $('#app').classList.add('hidden');
  }

  // Oturum süresi periyodik kontrolü (her dakika)
  setInterval(() => {
    if (!state.session) return;
    if (state.session.expiresAt && Date.now() > state.session.expiresAt) {
      showToast('Oturum süreniz doldu, tekrar giriş yapın', 'warning');
      clearSession();
      setTimeout(() => location.reload(), 2000);
    }
  }, 60 * 1000);
}

init();
</script>

</body>
</html>
